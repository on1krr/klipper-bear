[include mainsail.cfg]

[mcu]
#serial: /dev/serial/by-id/<your-mcu-id>
serial: /dev/serial/by-id/usb-Klipper_lpc1769_23F00111E484CA9507ED8F61C12000F5-if00

[virtual_sdcard]
path: /home/jgreco/printer_data/gcodes

[exclude_object]

[display_status]

[force_move]
enable_force_move: TRUE

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 30
max_z_accel: 300

[stepper_x]
step_pin: P2.2
dir_pin: !P2.6
enable_pin: !P2.1
microsteps: 16
rotation_distance: 32
full_steps_per_rotation: 400
endstop_pin: tmc2209_stepper_x:virtual_endstop
homing_retract_dist: 0
position_endstop: 0
position_max: 250
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: P1.10
run_current: 0.800                # Marlin has 580; changed to 600, 700, 800
diag_pin: P1.29                  # StallGuard Detect Pin (end-stop detection)
driver_SGTHRS: 150                # StallGuard Threshold (sesitivity)
#interpolate: false                # TMC2209 will not utilize internal micro-stepping of 256 (default = True)
#sense_resistor: 0.110
#stealthchop_threshold: 999999

[stepper_y]
step_pin: P0.19
dir_pin: P0.20
enable_pin: !P2.8
microsteps: 16
rotation_distance: 32
full_steps_per_rotation: 400
endstop_pin: tmc2209_stepper_y:virtual_endstop
homing_retract_dist: 0
position_endstop: -4
position_max: 220
position_min: -4
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: P1.9
run_current: 0.800                # Marlin has 650; changed to 700, 800
diag_pin: P1.28                   # StallGuard Detect Pin (end-stop detection)
driver_SGTHRS: 150                # StallGaurd Threshold (sensitivity)
#interpolate: false               # TMC2209 will not utilize internal micro-stepping of 256 (default = True)
#sense_resistor: 0.110
#stealthchop_threshold: 999999

[stepper_z]
step_pin: P0.22
dir_pin: !P2.11
enable_pin: !P0.21
microsteps: 32 #16
rotation_distance: 8
#endstop_pin: probe:z_virtual_endstop
endstop_pin: tmc2209_stepper_z:virtual_endstop
position_endstop: 200
position_max: 200
position_min: -50
homing_speed: 50

[tmc2209 stepper_z]
uart_pin: P1.8
run_current: 0.50                 # Marlin has 580; changed to
diag_pin: P1.27                   # StallGuard Detect Pin (end-stop detection)
driver_SGTHRS: 50                 # StallGaurd Threshold (sensitivity)
interpolate: false               # TMC2209 will not utilize internal micro-stepping of 256 (default = True)
sense_resistor: 0.110
#stealthchop_threshold: 999999


[probe]
pin: P1.25
#x_offset: 24
x_offset: 0
y_offset: 5
z_offset: 0.7 #Put Z-offset from 1st layer calibration baby-steps here.
speed: 5 #5
samples: 3 #Sampling, primarily for bed mesh. 3 is fine for normal PINDA probes.
samples_tolerance: 0.25
samples_result: average
sample_retract_dist: 2

[bed_mesh]
speed: 400
horizontal_move_z: 2
#mesh_min: 35, 6
#mesh_max: 240,198
#probe_count: 7,7
mesh_min: 21, 11.5
mesh_max: 236, 194.0
probe_count: 3,3
zero_reference_position = 125,105
#relative_reference_index: 25     #Generate mesh relative to center post for nylock.
mesh_pps: 0,0                     #Don't generate interperlated points so our mesh is compatible with nylock calculators like https://pcboy.github.io/g81_relative/

[heater_bed]
heater_pin: P2.5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.25
#control: pid
#pid_Kp: 126.13
#pid_Ki: 4.3
#pid_Kd: 924.76
min_temp: 0
max_temp: 130


#Home in lower, lefthand corner.
[homing_override]
gcode:
  G1 Z3
  G28 X0 Y200
  G1 X1 Y0 F5000
  G28 Z0
axes: Z
set_position_x: 0
set_position_y: 0
set_position_z: 0

[gcode_macro G80]
gcode:
# G28 #Avoid double homing if using PrusaSlicer or other default gcode.
  BED_MESH_CALIBRATE
  G1 X0 Y0 Z0.4 F4000

[gcode_macro G81]
gcode:
  BED_MESH_OUTPUT

